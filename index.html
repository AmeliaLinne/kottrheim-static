<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Amelia Andersson" />
    <title>A Love Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;1,300&family=Uncial+Antiqua&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        background-color: #111;
        color: #eee;
        font-family: 'Lato', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        /* Prevent side scroll on mobile */
        overflow-x: hidden;
      }

      /* ── Cover ── */
      .cover {
        width: 100%;
        max-width: 480px;
        padding: 56px 24px 40px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .cover-logo {
        width: 100%;
        max-width: 480px;
      }

      .cover-logo svg text {
        fill: #eee;
      }

      .scroll-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        margin-top: 6px;
        font-size: 0.7rem;
        font-weight: 300;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #666;
        animation: bob 2.2s ease-in-out infinite;
      }

      .scroll-hint svg {
        width: 16px;
        height: 16px;
        stroke: #666;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      @keyframes bob {
        0%, 100% { transform: translateY(0);   opacity: 0.6; }
        50%       { transform: translateY(5px); opacity: 1;   }
      }

      /* ── Comic strip ─────────────────────────────────────── */
      /*
         Webtoon style: panels stack with zero gap so they read
         as one continuous scroll. Each image fills the full
         column width.
      */
      .comic-strip {
        width: 100%;
        max-width: 480px;
        font-size: 0;
        line-height: 0;
        background-color: #fff;
      }

      .comic-strip img {
        width: 100%;
        height: auto;
        display: block;
        margin-bottom: -2px;
      }

      /* ── End card ── */
      .end-card {
        width: 100%;
        max-width: 480px;
        padding: 52px 24px 80px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .heart {
        font-size: 2rem;
        display: inline-block;
        animation: pulse 1.8s ease-in-out infinite;
        color: #f7c5c5;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1);    }
        50%       { transform: scale(1.18); }
      }

      .end-card h2 {
        font-family: 'Lobster', cursive;
        font-size: clamp(1.6rem, 6vw, 2rem);
        color: #f7c5c5;
      }

      .end-card p {
        font-size: 0.8rem;
        font-weight: 300;
        font-style: italic;
        color: #666;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>

    <!-- Cover -->
    <header class="cover">
      <div class="cover-logo">
        <svg width="100%" viewBox="0 0 680 285" role="img" xmlns="http://www.w3.org/2000/svg">
          <title>The Unexpected Party</title>
          <desc>Rustic hand-lettered fantasy logo for the webcomic "The Unexpected Party"</desc>
          <path d="M 75,72 Q 192,67 307,72 Q 192,77 75,72 Z" fill="#C8860A" opacity="0.55"/>
          <g transform="translate(340,72)">
            <line x1="0" y1="-12" x2="0" y2="12" stroke="#C8860A" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="-10.4" y1="-6" x2="10.4" y2="6" stroke="#C8860A" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="-10.4" y1="6" x2="10.4" y2="-6" stroke="#C8860A" stroke-width="2.2" stroke-linecap="round"/>
          </g>
          <path d="M 605,72 Q 488,67 373,72 Q 488,77 605,72 Z" fill="#C8860A" opacity="0.55"/>
          <circle cx="317" cy="72" r="2.5" fill="#C8860A" opacity="0.4"/>
          <circle cx="363" cy="72" r="2.5" fill="#C8860A" opacity="0.4"/>
          <text x="341" y="108" text-anchor="middle" font-family="'IM Fell English', Georgia, serif" font-style="italic" font-size="15" letter-spacing="6" fill="#C8860A" opacity="0.25">the</text>
          <text x="340" y="107" text-anchor="middle" font-family="'IM Fell English', Georgia, serif" font-style="italic" font-size="15" letter-spacing="6" fill="#ccc">the</text>
          <text x="342" y="170" text-anchor="middle" font-family="'Uncial Antiqua', cursive" font-size="56" fill="#C8860A" opacity="0.18">Unexpected</text>
          <text x="340" y="168" text-anchor="middle" font-family="'Uncial Antiqua', cursive" font-size="56" fill="#eee">Unexpected</text>
          <text x="342" y="217" text-anchor="middle" font-family="'Uncial Antiqua', cursive" font-size="44" fill="#C8860A" opacity="0.18">Party</text>
          <text x="340" y="215" text-anchor="middle" font-family="'Uncial Antiqua', cursive" font-size="44" fill="#eee">Party</text>
          <path d="M 78,237 Q 191,232 300,237 Q 191,242 78,237 Z" fill="#C8860A" opacity="0.55"/>
          <circle cx="327" cy="237" r="2" fill="#C8860A" opacity="0.4"/>
          <circle cx="340" cy="237" r="3.2" fill="#C8860A" opacity="0.55"/>
          <circle cx="353" cy="237" r="2" fill="#C8860A" opacity="0.4"/>
          <path d="M 602,237 Q 489,232 380,237 Q 489,242 602,237 Z" fill="#C8860A" opacity="0.55"/>
          <text x="341" y="261" text-anchor="middle" font-family="'IM Fell English', Georgia, serif" font-style="italic" font-size="13" letter-spacing="4" fill="#C8860A" opacity="0.22">a webcomic</text>
          <text x="340" y="260" text-anchor="middle" font-family="'IM Fell English', Georgia, serif" font-style="italic" font-size="13" letter-spacing="4" fill="#888">a webcomic</text>
        </svg>
      </div>
      <div class="scroll-hint">
        scroll to read
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </header>

    <!-- Comic pages — zero-gap vertical scroll -->
    <main class="comic-strip">
      <img src="img/Party/1.png"  alt="Page 1"  />
      <img src="img/Party/2.png"  alt="Page 2"  />
      <img src="img/Party/3.png"  alt="Page 3"  />
      <img src="img/Party/4.png"  alt="Page 4"  />
      <img src="img/Party/5.png"  alt="Page 5"  />
      <img src="img/Party/6.png"  alt="Page 6"  />
      <img src="img/Party/7.png"  alt="Page 7"  />
      <img src="img/Party/8.png"  alt="Page 8"  />
      <img src="img/Party/9.png"  alt="Page 9"  />
      <img src="img/Party/10.png" alt="Page 10" />
      <img src="img/Party/11.png" alt="Page 11" />
      <img src="img/Party/12.png" alt="Page 12" />
      <img src="img/Party/13.png" alt="Page 13" />
      <img src="img/Party/14.png" alt="Page 14" />
    </main>

    <!-- End card -->
    <footer class="end-card">
      <span class="heart">♡</span>
      <h2>The End</h2>
      <p>just for you</p>
    </footer>

  </body>
</html>
